<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Happy Birthday Onkar</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    min-height:100vh;
    background:linear-gradient(135deg,#ffe6f0,#ffffff);
    display:flex;
    flex-direction:column;
    justify-content:center;
    align-items:center;
    font-family:'Segoe UI', sans-serif;
    padding:20px;
}

/* Happy Birthday Text */
h1{
    color:#e91e63;
    font-size:clamp(32px,6vw,60px);
    text-align:center;
    font-weight:bold;
    text-shadow:2px 2px 8px rgba(0,0,0,0.3);
    margin-bottom:20px;
}

/* Slideshow Box */
.slideshow{
    width:90%;
    max-width:700px;
    height:60vh;
    max-height:400px;
    position:relative;
    border-radius:20px;
    overflow:hidden;
    box-shadow:0 15px 40px rgba(0,0,0,0.2);
    background:white;
    display:flex;
    justify-content:center;
    align-items:center;
}

/* Images */
.slide{
    position:absolute;
    max-width:100%;
    max-height:100%;
    object-fit:contain; /* Adjust image without cropping */
    opacity:0;
    transition:opacity 1s ease-in-out;
}

/* Active image */
.active{
    opacity:1;
}

/* Optional music controls (hidden) */
audio{
    display:none;
}
</style>
</head>
<body>

<!-- Happy Birthday Text -->
<h1>Happy Birthday Onkar! 🎉</h1>

<!-- Slideshow -->
<div class="slideshow">
    <img src="img2.jpeg" class="slide active">
    <img src="img3.jpeg" class="slide">
    <img src="img4.jpeg" class="slide">
    <img src="img5.jpeg" class="slide">
    <img src="img6.jpeg" class="slide">
    <img src="img7.jpeg" class="slide">
    <img src="img8.jpeg" class="slide">
    <img src="img9.jpeg" class="slide">
    <img src="img10.jpeg" class="slide">
    <img src="img11.jpeg" class="slide">
    <img src="img12.jpeg" class="slide">
    <img src="img13.jpeg" class="slide">
    <img src="img14.jpeg" class="slide">
    <img src="img15.jpeg" class="slide">



    
    
</div>

<!-- Audio -->
<audio id="birthdayMusic" loop>
    <source src="../Savera Iqlipse Nova 128 Kbps.mp3" type="audio/mpeg">
</audio>

<script>
// Slideshow
let slides = document.querySelectorAll(".slide");
let current = 0;

setInterval(() => {
    slides[current].classList.remove("active");
    current = (current + 1) % slides.length;
    slides[current].classList.add("active");
}, 4000);

// Play music after 2 seconds
window.addEventListener("load", function(){
    setTimeout(function(){
        let audio = document.getElementById("birthdayMusic");
        audio.play().catch(e => {
            console.log("Autoplay blocked by browser");
        });
    }, 2000);
});
</script>




<a href=".//page4.html"> Click Me</a>
</body>

</html>
