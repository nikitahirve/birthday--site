<!DOCTYPE html>
<html>
<head>
<title>Happy Birthday Onkar</title>
<style>
body{
    font-family: Arial, sans-serif;
    background:#fff;
    text-align:center;
}
h1{
    color:#e91e63;
}
.calendar{
    display:grid;
    grid-template-columns: repeat(4, 1fr);
    gap:20px;
    padding:20px;
}
.month{
    border:2px solid #f8bbd0;
    padding:20px;
    background:#fff0f6;
    border-radius:10px;
    transition:0.3s;
}
.month a{
    text-decoration:none;
    color:#d81b60;
    font-weight:bold;
    font-size:18px;
}
.month:hover{
    background:#fce4ec;
    transform:scale(1.05);
}

/* Highlight March */
.highlight{
    background:#f06292;
}
.highlight a{
    color:white;
}
</style>
</head>
<body>

<h1>2026 Yearly Calendar</h1>

<div class="calendar">
    <div class="month"><a href="#">January</a></div>
    <div class="month"><a href="#">February</a></div>
    <div class="month highlight"><a href="./page2.html">March</a></div>
    <div class="month"><a href="#">April</a></div>
    <div class="month"><a href="#">May</a></div>
    <div class="month"><a href="#">June</a></div>
    <div class="month"><a href="#">July</a></div>
    <div class="month"><a href="#">August</a></div>
    <div class="month"><a href="#">September</a></div>
    <div class="month"><a href="#">October</a></div>
    <div class="month"><a href="#">November</a></div>
    <div class="month"><a href="#">December</a></div>




    
</div>

</body>
</html>
